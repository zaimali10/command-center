<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Command Center</title>
  <style>
    /* ── Design tokens ───────────────────────────────────────────── */
    :root {
      --bg:        #0a0e1a;
      --bg-2:      #0f1426;
      --fg:        #e6f1ff;
      --fg-dim:    #9aa9c2;
      --accent:    #00ffd0;
      --accent-2:  #7afcff;
      --danger:    #ff5577;
      --warn:      #ffaa33;
      --glass-bg:  rgba(255, 255, 255, 0.04);
      --glass-br:  rgba(255, 255, 255, 0.08);
      --radius:    18px;
      --gap:       16px;
      --font-ui:   -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', Menlo, Consolas, 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-ui);
      color: var(--fg);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(0,255,208,0.08), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(122,252,255,0.06), transparent 60%),
        var(--bg);
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Persistent header ────────────────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 24px 32px 16px;
    }
    #clock {
      font-family: var(--font-mono);
      font-size: 56px;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(0,255,208,0.45);
    }
    #date {
      font-size: 20px;
      color: var(--fg-dim);
      letter-spacing: 1px;
    }
    .mode-indicator { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-family: var(--font-mono); }
    .mode-indicator.live   { color: #00ffd0; background: rgba(0,255,208,0.1); border: 1px solid rgba(0,255,208,0.3); }
    .mode-indicator.static { color: var(--fg-dim); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }

    /* ── Tab bar ──────────────────────────────────────────────────── */
    nav.tabs {
      display: flex;
      gap: 8px;
      padding: 0 32px 16px;
    }
    .tab-btn {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid var(--glass-br);
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      color: var(--fg-dim);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 160ms ease, background 160ms ease, border-color 160ms ease, transform 120ms ease;
    }
    .tab-btn:hover  { color: var(--fg); }
    .tab-btn:active { transform: scale(0.97); }
    .tab-btn.active {
      color: var(--bg);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: var(--accent);
      box-shadow: 0 0 24px rgba(0,255,208,0.35);
    }

    /* ── Tab panels ───────────────────────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Dashboard grid ───────────────────────────────────────────── */
    main#dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: minmax(180px, auto);
      gap: var(--gap);
      padding: 8px 32px 24px;
    }
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-br);
      border-radius: var(--radius);
      padding: 20px;
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 180px;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }
    .card:hover { transform: scale(1.01); }
    .card h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      opacity: 0.85;
    }
    .card .empty { color: var(--fg-dim); font-size: 14px; }
    .span-2     { grid-column: span 2; }
    .span-full  { grid-column: 1 / -1; }

    /* ── To-Do tab (roomier) ──────────────────────────────────────── */
    #todo-tab {
      padding: 8px 32px 24px;
      max-width: 720px;
      margin: 0 auto;
    }
    #todo-tab .card { min-height: 360px; padding: 28px; }
    #todo-tab .todo-list { max-height: none; }

    footer#widget-quote {
      padding: 24px 32px 32px;
      text-align: center;
      color: var(--fg-dim);
      font-style: italic;
      font-size: 16px;
    }

    /* ── Hermes / system rows ─────────────────────────────────────── */
    .hermes-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--fg-dim); }
    .hermes-row span:last-child { color: var(--fg); font-family: var(--font-mono); }
    .hermes-status { display: inline-flex; align-items: center; gap: 8px; font-size: 16px; color: var(--fg); }
    .hermes-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .hermes-dot.offline { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

    /* ── Projects ─────────────────────────────────────────────────── */
    .proj-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .proj {
      flex: 1 1 180px;
      min-width: 180px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(0, 255, 208, 0.04);
      border: 1px solid rgba(0, 255, 208, 0.18);
      display: flex; flex-direction: column; gap: 6px;
      text-decoration: none;
      color: var(--fg);
      min-height: 88px;
      transition: background 120ms ease, transform 120ms ease;
    }
    .proj:active { transform: scale(0.98); background: rgba(0,255,208,0.10); }
    .proj-label { font-size: 16px; font-weight: 600; color: var(--accent); }
    .proj-desc  { font-size: 12px; color: var(--fg-dim); font-family: var(--font-mono); }
    .proj-cta   { margin-top: auto; font-size: 12px; color: var(--accent-2); }

    /* ── Discord ──────────────────────────────────────────────────── */
    .discord-btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 10px;
      padding: 16px 20px;
      margin-top: auto;
      min-height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(0,255,208,0.18), rgba(122,252,255,0.10));
      border: 1px solid rgba(0,255,208,0.35);
      color: var(--fg);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: transform 120ms ease, background 120ms ease;
    }
    .discord-btn:active { transform: scale(0.97); background: rgba(0,255,208,0.22); }
    .discord-sub { color: var(--fg-dim); font-size: 13px; }

    /* ── To-Do ────────────────────────────────────────────────────── */
    .todo-input-row { display: flex; gap: 8px; }
    .todo-input {
      flex: 1;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--glass-br);
      background: rgba(255,255,255,0.03);
      color: var(--fg);
      font-family: var(--font-ui);
      font-size: 16px;
      outline: none;
    }
    .todo-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,255,208,0.2); }
    .todo-add {
      min-width: 56px; min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--accent);
      background: rgba(0,255,208,0.12);
      color: var(--accent);
      border-radius: 12px;
      font-size: 20px; font-weight: 700;
      cursor: pointer;
    }
    .todo-add:active { background: rgba(0,255,208,0.22); }
    .todo-list { list-style: none; display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
    .todo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      min-height: 44px;
    }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--fg-dim); }
    .todo-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--accent);
      background: transparent;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .todo-check.checked { background: var(--accent); }
    .todo-check.checked::after { content: '✓'; color: var(--bg); font-weight: 900; font-size: 14px; }
    .todo-text { flex: 1; font-size: 15px; color: var(--fg); word-break: break-word; }
    .todo-del {
      background: none; border: none; color: var(--fg-dim);
      font-size: 20px; cursor: pointer; padding: 4px 8px; min-width: 32px; min-height: 32px;
    }
    .todo-del:active { color: var(--danger); }
    .todo-empty { color: var(--fg-dim); font-size: 14px; padding: 8px 4px; }

    /* ── Weather ──────────────────────────────────────────────────── */
    .wx-main { display: flex; align-items: center; gap: 14px; }
    .wx-icon { font-size: 44px; line-height: 1; }
    .wx-temp { font-family: var(--font-mono); font-size: 36px; color: var(--accent); text-shadow: 0 0 12px rgba(0,255,208,0.35); }
    .wx-desc { color: var(--fg-dim); font-size: 14px; }
    .wx-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px 14px; font-size: 13px; }
    .wx-grid .k { color: var(--fg-dim); }
    .wx-grid .v { color: var(--fg); font-family: var(--font-mono); }
    .wx-err { color: var(--danger); font-size: 13px; }

    /* ── GitHub ───────────────────────────────────────────────────── */
    .gh-spark { font-family: var(--font-mono); font-size: 22px; letter-spacing: 4px; color: var(--accent); line-height: 1; }
    .gh-spark .lo  { color: rgba(0,255,208,0.25); }
    .gh-spark .mid { color: rgba(0,255,208,0.65); }
    .gh-spark .hi  { color: var(--accent); text-shadow: 0 0 8px var(--accent); }
    .gh-count { font-size: 12px; color: var(--fg-dim); margin-left: 8px; vertical-align: middle; }
    .gh-events { display: flex; flex-direction: column; gap: 4px; font-size: 13px; max-height: 160px; overflow-y: auto; }
    .gh-event  { display: flex; justify-content: space-between; gap: 10px; padding: 4px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); }
    .gh-event:last-child { border-bottom: 0; }
    .gh-verb { color: var(--accent-2); font-family: var(--font-mono); width: 56px; flex-shrink: 0; }
    .gh-repo { color: var(--fg); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gh-when { color: var(--fg-dim); font-family: var(--font-mono); font-size: 12px; flex-shrink: 0; }
    .gh-err  { color: var(--danger); font-size: 13px; }

    /* ── Stats / table ────────────────────────────────────────────── */
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; }
    .stat-row .label { color: var(--fg-dim); }
    .stat-row .value { color: var(--fg); font-family: var(--font-mono); }
    .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; }
    .badge-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .badge-dot.green  { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
    .badge-dot.red    { background: #ff5577; box-shadow: 0 0 6px #ff5577; }
    .badge-dot.yellow { background: #ffaa33; box-shadow: 0 0 6px #ffaa33; }
    .badge-dot.gray   { background: var(--fg-dim); }
    .sparkline { font-family: var(--font-mono); font-size: 18px; letter-spacing: 2px; color: var(--accent); line-height: 1.4; }
    table.widget-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.widget-table tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    table.widget-table td { padding: 6px 4px; }
    table.widget-table td:first-child { color: var(--fg-dim); }

    /* ── System Monitor placeholder ───────────────────────────────── */
    .mon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .mon-cell {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--glass-br);
    }
    .mon-k { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--fg-dim); }
    .mon-v { font-family: var(--font-mono); font-size: 20px; color: var(--accent); margin-top: 4px; }
    .mon-bar { margin-top: 8px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06); overflow: hidden; }
    .mon-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 400ms ease; }
    .mon-foot { margin-top: 10px; font-size: 12px; color: var(--fg-dim); font-style: italic; }

    /* ── Kanban board ─────────────────────────────────────────────── */
    #kanban-tab { padding: 8px 32px 24px; }
    #widget-kanban { position: relative; }
    .kb-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
    }
    .kb-col {
      background: var(--glass-bg);
      border: 1px solid var(--glass-br);
      border-radius: var(--radius);
      padding: 16px;
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      display: flex; flex-direction: column;
      min-height: 60vh;
    }
    .kb-col-head {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--glass-br);
      margin-bottom: 12px;
    }
    .kb-col-head h3 {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent);
    }
    .kb-count {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(0,255,208,0.08);
      color: var(--accent-2);
    }
    .kb-add {
      margin-left: auto;
      min-width: 32px; min-height: 32px;
      border: 1px dashed rgba(0,255,208,0.4);
      background: transparent;
      color: var(--accent);
      border-radius: 10px;
      font-size: 18px; font-weight: 700;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease, border-style 120ms ease;
    }
    .kb-add:hover  { background: rgba(0,255,208,0.10); border-style: solid; }
    .kb-add:active { transform: scale(0.94); }
    .kb-col-body  { display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .kb-empty {
      color: var(--fg-dim);
      font-size: 13px;
      font-style: italic;
      padding: 18px 8px;
      text-align: center;
      border: 1px dashed rgba(255,255,255,0.06);
      border-radius: 10px;
    }
    .kb-card {
      position: relative;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-br);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      outline: none;
    }
    .kb-card:hover  { background: rgba(255,255,255,0.06); border-color: rgba(0,255,208,0.25); }
    .kb-card:focus-visible { box-shadow: 0 0 0 2px rgba(0,255,208,0.5); }
    .kb-card.kb-pressed { transform: scale(0.97); background: rgba(0,255,208,0.10); border-color: var(--accent); }
    .kb-card-title { font-size: 14px; font-weight: 600; color: var(--fg); padding-right: 18px; line-height: 1.35; }
    .kb-card-desc  { margin-top: 6px; font-size: 12px; color: var(--fg-dim); line-height: 1.4; }
    .kb-card-meta  { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .kb-tag {
      --tag-h: 180;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 999px;
      color: hsl(var(--tag-h), 80%, 75%);
      background: hsla(var(--tag-h), 80%, 60%, 0.12);
      border: 1px solid hsla(var(--tag-h), 80%, 60%, 0.35);
    }
    .kb-due {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: auto;
    }
    .kb-due-overdue { color: var(--danger);   background: rgba(255,85,119,0.10); border: 1px solid rgba(255,85,119,0.35); }
    .kb-due-today   { color: var(--warn);     background: rgba(255,170,51,0.10); border: 1px solid rgba(255,170,51,0.35); }
    .kb-due-soon    { color: var(--accent-2); background: rgba(122,252,255,0.10); border: 1px solid rgba(122,252,255,0.35); }
    .kb-due-later   { color: var(--fg-dim);   background: rgba(255,255,255,0.04); border: 1px solid var(--glass-br); }
    .kb-card-del {
      position: absolute;
      top: 6px; right: 8px;
      width: 22px; height: 22px;
      background: none; border: none;
      color: var(--fg-dim);
      font-size: 18px; line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 140ms ease, color 140ms ease;
    }
    .kb-card:hover .kb-card-del,
    .kb-card:focus-within .kb-card-del { opacity: 1; }
    .kb-card-del:hover { color: var(--danger); }

    /* Kanban modal */
    .kb-modal {
      position: fixed; inset: 0;
      background: rgba(5,8,16,0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      z-index: 100;
      animation: kb-fade 160ms ease;
    }
    .kb-modal[hidden] { display: none; }
    @keyframes kb-fade { from { opacity: 0; } to { opacity: 1; } }
    .kb-modal-panel {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(135deg, rgba(15,20,38,0.95), rgba(10,14,26,0.95));
      border: 1px solid var(--glass-br);
      border-radius: var(--radius);
      padding: 24px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
      animation: kb-pop 180ms cubic-bezier(0.2, 0.9, 0.3, 1.2);
    }
    @keyframes kb-pop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .kb-modal-panel h3 {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent);
    }
    .kb-field { display: flex; flex-direction: column; gap: 6px; }
    .kb-field > span {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--fg-dim);
    }
    .kb-field > span em { font-style: normal; text-transform: none; color: var(--fg-dim); opacity: 0.7; letter-spacing: 0; }
    .kb-field input,
    .kb-field textarea {
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--glass-br);
      background: rgba(255,255,255,0.03);
      color: var(--fg);
      font-family: var(--font-ui);
      font-size: 15px;
      outline: none;
      resize: vertical;
    }
    .kb-field input:focus,
    .kb-field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,255,208,0.2);
    }
    .kb-modal-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 4px;
    }
    .kb-btn-ghost, .kb-btn-primary {
      min-height: 44px;
      padding: 0 18px;
      border-radius: 12px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }
    .kb-btn-ghost {
      border: 1px solid var(--glass-br);
      background: transparent;
      color: var(--fg-dim);
    }
    .kb-btn-ghost:hover { color: var(--fg); }
    .kb-btn-primary {
      border: 1px solid var(--accent);
      background: linear-gradient(135deg, rgba(0,255,208,0.25), rgba(122,252,255,0.15));
      color: var(--accent);
    }
    .kb-btn-primary:active { transform: scale(0.97); background: rgba(0,255,208,0.30); }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 1000px) {
      main#dashboard { grid-template-columns: repeat(2, 1fr); }
      .kb-board      { grid-template-columns: 1fr; }
      .mon-grid      { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      main#dashboard { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: flex-start; gap: 4px; padding: 16px; }
      #clock { font-size: 44px; }
      nav.tabs  { padding: 0 16px 12px; overflow-x: auto; }
      .tab-btn  { padding: 0 16px; font-size: 12px; }
      #kanban-tab { padding: 8px 16px 20px; }
      #todo-tab   { padding: 8px 16px 20px; }
    }

    /* iPad fine-tuning */
    @media (min-width: 768px) and (max-width: 1366px) and (pointer: coarse) {
      body { font-size: 16px; }
      .card { min-height: 200px; padding: 22px; }
      .todo-input, .todo-add, .todo-del, .todo-check, .discord-btn, .proj { font-size: 16px; }
      html, body { overscroll-behavior: none; }
    }

    .gh-events::-webkit-scrollbar, .todo-list::-webkit-scrollbar { width: 6px; }
    .gh-events::-webkit-scrollbar-thumb, .todo-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1); border-radius: 3px;
    }
  </style>
</head>
