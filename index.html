<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Command Center</title>
  <style>
    /* Phase 1: design tokens + base reset */
    :root {
      --bg:        #0a0e1a;
      --bg-2:      #0f1426;
      --fg:        #e6f1ff;
      --fg-dim:    #9aa9c2;
      --accent:    #00ffd0;
      --accent-2:  #7afcff;
      --danger:    #ff5577;
      --glass-bg:  rgba(255, 255, 255, 0.04);
      --glass-br:  rgba(255, 255, 255, 0.08);
      --radius:    18px;
      --gap:       16px;
      --font-ui:   -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', Menlo, Consolas, 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-ui);
      color: var(--fg);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(0,255,208,0.08), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(122,252,255,0.06), transparent 60%),
        var(--bg);
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 24px 32px 16px;
    }
    #clock {
      font-family: var(--font-mono);
      font-size: 56px;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(0,255,208,0.45);
    }
    #date {
      font-size: 20px;
      color: var(--fg-dim);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <header>
    <div id="clock">00:00:00</div>
    <div id="date">— — —</div>
  </header>

  <main id="grid"></main>

  <footer id="widget-quote"></footer>

  <script>
    'use strict';
    const CONFIG = {};  // populated in Phase 3
    // widget IIFEs land here in later phases
  </script>
</body>
</html>
