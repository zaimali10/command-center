<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Command Center</title>
  <style>
    /* Phase 1: design tokens + base reset */
    :root {
      --bg:        #0a0e1a;
      --bg-2:      #0f1426;
      --fg:        #e6f1ff;
      --fg-dim:    #9aa9c2;
      --accent:    #00ffd0;
      --accent-2:  #7afcff;
      --danger:    #ff5577;
      --glass-bg:  rgba(255, 255, 255, 0.04);
      --glass-br:  rgba(255, 255, 255, 0.08);
      --radius:    18px;
      --gap:       16px;
      --font-ui:   -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', Menlo, Consolas, 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-ui);
      color: var(--fg);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(0,255,208,0.08), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(122,252,255,0.06), transparent 60%),
        var(--bg);
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 24px 32px 16px;
    }
    #clock {
      font-family: var(--font-mono);
      font-size: 56px;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(0,255,208,0.45);
    }
    #date {
      font-size: 20px;
      color: var(--fg-dim);
      letter-spacing: 1px;
    }
    main#grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: minmax(180px, auto);
      gap: var(--gap);
      padding: 8px 32px 24px;
    }
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-br);
      border-radius: var(--radius);
      padding: 20px;
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 180px;
    }
    .card h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      opacity: 0.85;
    }
    .card .empty {
      color: var(--fg-dim);
      font-size: 14px;
    }
    /* span helpers */
    .span-2 { grid-column: span 2; }
    .span-full { grid-column: 1 / -1; }

    footer#widget-quote {
      padding: 24px 32px 32px;
      text-align: center;
      color: var(--fg-dim);
      font-style: italic;
      font-size: 16px;
    }

    /* responsive */
    @media (max-width: 1000px) {
      main#grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px) {
      main#grid { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: flex-start; gap: 4px; padding: 16px; }
      #clock { font-size: 44px; }
    }
  </style>
</head>
<body>
  <header>
    <div id="clock">00:00:00</div>
    <div id="date">— — —</div>
  </header>

  <main id="grid">
    <section class="card" id="widget-weather">
      <h2>Weather · Dallas</h2>
      <div class="empty">loading…</div>
    </section>

    <section class="card" id="widget-todo">
      <h2>To-Do</h2>
      <div class="empty">no tasks</div>
    </section>

    <section class="card" id="widget-hermes">
      <h2>Hermes</h2>
      <div class="empty">—</div>
    </section>

    <section class="card span-2" id="widget-projects">
      <h2>Projects</h2>
      <div class="empty">—</div>
    </section>

    <section class="card" id="widget-discord">
      <h2>Quick Chat</h2>
      <div class="empty">—</div>
    </section>

    <section class="card span-2" id="widget-github">
      <h2>GitHub Pulse</h2>
      <div class="empty">loading…</div>
    </section>
  </main>

  <footer id="widget-quote"></footer>

  <script>
    'use strict';
    const CONFIG = {};  // populated in Phase 3
    // widget IIFEs land here in later phases
  </script>
</body>
</html>
